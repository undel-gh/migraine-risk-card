###############################################################################
# TEMPLATE SENSORS
###############################################################################

template:
  - sensor:
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # BASE DATA COLLECTION
      # These sensors normalise your data sources into a consistent
      # set of "migraine_*" entities used by the scoring system.
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      - name: "Migraine Temperature"
        unique_id: migraine_temperature
        state: >
          {% set weather_entity = states('input_text.migraine_source_weather') %}
          {% set temp_entity = states('input_text.migraine_source_temperature') %}
          {% macro to_celsius(v, source_entity=None) %}
            {% set f = v | float(0) %}
            {% set unit = state_attr(source_entity, 'unit_of_measurement') if source_entity else None %}
            {% if unit in ['°F','F','fahrenheit'] or (unit is none and f > 50) %}
              {{ ((f - 32) * 5 / 9) | round(2) }}
            {% else %}
              {{ f }}
            {% endif %}
          {% endmacro %}
          {% if temp_entity not in ['not_configured','unknown','unavailable','',none] %}
            {% set v = states(temp_entity) %}
            {% if v not in ['unknown','unavailable','',none] %}
              {{ to_celsius(v, temp_entity) | trim }}
            {% else %}
              {% set wa = state_attr(weather_entity, 'temperature') %}
              {{ to_celsius(wa) | trim if wa is number else none }}
            {% endif %}
          {% elif weather_entity not in ['not_configured','unknown','unavailable','',none] %}
            {% set wa = state_attr(weather_entity, 'temperature') %}
            {{ to_celsius(wa) | trim if wa is number else none }}
          {% else %}
            {{ none }}
          {% endif %}
        unit_of_measurement: "°C"
        icon: mdi:thermometer

      - name: "Migraine Humidity (%)"
        unique_id: migraine_humidity
        state: >
          {% set weather_entity = states('input_text.migraine_source_weather') %}
          {% set hum_entity = states('input_text.migraine_source_humidity') %}
          {% if hum_entity not in ['not_configured','unknown','unavailable','',none] %}
            {% set v = states(hum_entity) %}
            {% if v not in ['unknown','unavailable','',none] %}
              {{ v | float(0) }}
            {% else %}
              {% set wa = state_attr(weather_entity, 'humidity') %}
              {{ wa | float if wa is number else none }}
            {% endif %}
          {% elif weather_entity not in ['not_configured','unknown','unavailable','',none] %}
            {% set wa = state_attr(weather_entity, 'humidity') %}
            {{ wa | float if wa is number else none }}
          {% else %}
            {{ none }}
          {% endif %}
        unit_of_measurement: "%"
        icon: mdi:water-percent

      - name: "Migraine Pressure (hPa)"
        unique_id: migraine_pressure_hpa
        state: >
          {% set weather_entity = states('input_text.migraine_source_weather') %}
          {% set pres_entity = states('input_text.migraine_source_pressure') %}
          {% macro to_hpa(v) %}
            {% set f = v | float(0) %}
            {% if f >= 25 and f <= 33 %}
              {{ (f * 33.8639) | round(2) }}
            {% elif f >= 600 and f <= 825 %}
              {{ (f * 1.33322) | round(2) }}
            {% else %}
              {{ f }}
            {% endif %}
          {% endmacro %}
          {% if pres_entity not in ['not_configured','unknown','unavailable','',none] %}
            {% set v = states(pres_entity) %}
            {% if v not in ['unknown','unavailable','',none] and v | float(0) > 0 %}
              {{ to_hpa(v) | trim }}
            {% elif weather_entity not in ['not_configured','unknown','unavailable','',none] %}
              {% set wa = state_attr(weather_entity, 'pressure') %}
              {{ to_hpa(wa) | trim if wa is number else 0 }}
            {% else %}
              {{ 0 }}
            {% endif %}
          {% elif weather_entity not in ['not_configured','unknown','unavailable','',none] %}
            {% set wa = state_attr(weather_entity, 'pressure') %}
            {{ to_hpa(wa) | trim if wa is number else 0 }}
          {% else %}
            {{ 0 }}
          {% endif %}
        unit_of_measurement: "hPa"
        icon: mdi:gauge

      - name: "Migraine Wind Speed"
        unique_id: migraine_wind_speed
        state: >
          {% set weather_entity = states('input_text.migraine_source_weather') %}
          {% set wind_entity = states('input_text.migraine_source_wind_speed') %}
          {% macro to_kmh(v, source_entity=None) %}
            {% set f = v | float(0) %}
            {% set unit = state_attr(source_entity, 'unit_of_measurement') if source_entity else None %}
            {% set weather_unit = state_attr(weather_entity, 'wind_speed_unit') if weather_entity not in ['not_configured','unknown','unavailable','',none] else None %}
            {% if unit in ['mph','MPH'] or (source_entity is none and weather_unit == 'mph') %}
              {{ (f * 1.60934) | round(2) }}
            {% elif unit in ['m/s','meters_per_second'] or (source_entity is none and weather_unit == 'm/s') %}
              {{ (f * 3.6) | round(2) }}
            {% elif unit in ['knots','kn','kt'] or (source_entity is none and weather_unit in ['kn','knots']) %}
              {{ (f * 1.852) | round(2) }}
            {% else %}
              {{ f }}
            {% endif %}
          {% endmacro %}
          {% if wind_entity not in ['not_configured','unknown','unavailable','',none] %}
            {% set v = states(wind_entity) %}
            {% if v not in ['unknown','unavailable','',none] %}
              {{ to_kmh(v, wind_entity) | trim }}
            {% else %}
              {% set wa = state_attr(weather_entity, 'wind_speed') %}
              {{ to_kmh(wa) | trim if wa is number else 0 }}
            {% endif %}
          {% elif weather_entity not in ['not_configured','unknown','unavailable','',none] %}
            {% set wa = state_attr(weather_entity, 'wind_speed') %}
            {{ to_kmh(wa) | trim if wa is number else 0 }}
          {% else %}
            {{ 0 }}
          {% endif %}
        unit_of_measurement: "km/h"
        icon: mdi:weather-windy

      - name: "Migraine UV Index"
        unique_id: migraine_uv_index
        state: >
          {% set weather_entity = states('input_text.migraine_source_weather') %}
          {% set uv_entity = states('input_text.migraine_source_uv_index') %}
          {% if uv_entity not in ['not_configured','unknown','unavailable','',none] %}
            {% set v = states(uv_entity) %}
            {% if v not in ['unknown','unavailable','',none] %}
              {{ v | float(0) }}
            {% else %}
              {% set wa = state_attr(weather_entity, 'uv_index') %}
              {{ wa | float(0) if wa is not none else 0 }}
            {% endif %}
          {% elif weather_entity not in ['not_configured','unknown','unavailable','',none] %}
            {% set wa = state_attr(weather_entity, 'uv_index') %}
            {{ wa | float(0) if wa is not none else 0 }}
          {% else %}
            {{ 0 }}
          {% endif %}
        icon: mdi:weather-sunny-alert

      - name: "Migraine WAQI AQI"
        unique_id: migraine_waqi_aqi
        state: >
          {% set aqi_entity = states('input_text.migraine_source_aqi') %}
          {% if aqi_entity not in ['not_configured','unknown','unavailable','',none] %}
            {% set v = states(aqi_entity) %}
            {{ v | float(0) if v not in ['unknown','unavailable','',none] else 0 }}
          {% else %}
            {{ 0 }}
          {% endif %}
        unit_of_measurement: "AQI"
        icon: mdi:chemical-weapon

      - name: "Migraine WAQI PM2.5"
        unique_id: migraine_waqi_pm25
        state: >
          {% set pm25_entity = states('input_text.migraine_source_pm25') %}
          {% if pm25_entity not in ['not_configured','unknown','unavailable','',none] %}
            {% set v = states(pm25_entity) %}
            {{ v | float(0) if v not in ['unknown','unavailable','',none] else 0 }}
          {% else %}
            {{ 0 }}
          {% endif %}
        unit_of_measurement: "µg/m³"
        icon: mdi:blur

      - name: "Migraine WAQI PM10"
        unique_id: migraine_waqi_pm10
        state: >
          {% set pm10_entity = states('input_text.migraine_source_pm10') %}
          {% if pm10_entity not in ['not_configured','unknown','unavailable','',none] %}
            {% set v = states(pm10_entity) %}
            {{ v | float(0) if v not in ['unknown','unavailable','',none] else 0 }}
          {% else %}
            {{ 0 }}
          {% endif %}
        unit_of_measurement: "µg/m³"
        icon: mdi:blur-linear

      - name: "Migraine WAQI Ozone"
        unique_id: migraine_waqi_o3
        state: >
          {% set o3_entity = states('input_text.migraine_source_ozone') %}
          {% if o3_entity not in ['not_configured','unknown','unavailable','',none] %}
            {% set v = states(o3_entity) %}
            {{ v | float(0) if v not in ['unknown','unavailable','',none] else 0 }}
          {% else %}
            {{ 0 }}
          {% endif %}
        unit_of_measurement: "µg/m³"
        icon: mdi:molecule

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # PRESSURE DROP TRACKING
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      - name: Migraine Pressure Drop (6h)
        unique_id: migraine_pressure_drop_6h
        unit_of_measurement: "hPa"
        device_class: pressure
        state_class: measurement
        availability: >
          {{ states('sensor.migraine_pressure_hpa') not in ['unknown','unavailable','',none]
             and states('sensor.migraine_pressure_hpa') | float(0) > 900 }}
        state: >
          {% set current = states('sensor.migraine_pressure_hpa') | float(0) %}
          {% set peak_6h = states('input_number.pressure_6h_peak') | float(0) %}
          {% set drop = peak_6h - current %}
          {{ [drop, 0] | max | round(1) }}
        icon: mdi:trending-down
        attributes:
          current_pressure: "{{ states('sensor.migraine_pressure_hpa') }}"
          peak_pressure_6h: "{{ states('input_number.pressure_6h_peak') }}"

      - name: Migraine Pressure Drop (24h)
        unique_id: migraine_pressure_drop_24h
        unit_of_measurement: "hPa"
        device_class: pressure
        state_class: measurement
        availability: >
          {{ states('sensor.migraine_pressure_hpa') not in ['unknown','unavailable','',none]
             and states('sensor.migraine_pressure_hpa') | float(0) > 900 }}
        state: >
          {% set current = states('sensor.migraine_pressure_hpa') | float(0) %}
          {% set peak_24h = states('input_number.pressure_24h_peak') | float(0) %}
          {% set drop = peak_24h - current %}
          {{ [drop, 0] | max | round(1) }}
        icon: mdi:trending-down
        attributes:
          current_pressure: "{{ states('sensor.migraine_pressure_hpa') }}"
          peak_pressure_24h: "{{ states('input_number.pressure_24h_peak') }}"

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # TEMPERATURE CHANGE TRACKING
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      - name: "Migraine Temperature Change (6h)"
        unique_id: migraine_temperature_change_6h
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        availability: >
          {{ states('sensor.migraine_temperature') not in ['unknown','unavailable','',none]
             and states('input_number.temperature_6h_reset_time') | int(0) != 0 }}
        state: >
          {% set current = states('sensor.migraine_temperature') | float(0) %}
          {% set baseline = states('input_number.temperature_6h_baseline') | float(0) %}
          {{ (current - baseline) | abs | round(1) }}
        icon: mdi:thermometer-chevron-up
        attributes:
          current_temp: "{{ states('sensor.migraine_temperature') }}"
          baseline_temp_6h: "{{ states('input_number.temperature_6h_baseline') }}"
          direction: >
            {% set current = states('sensor.migraine_temperature') | float(0) %}
            {% set baseline = states('input_number.temperature_6h_baseline') | float(0) %}
            {% if current > baseline + 0.5 %}
              Rising
            {% elif current < baseline - 0.5 %}
              Falling
            {% else %}
              Stable
            {% endif %}

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # MIGRAINE FACTOR SENSORS (0-2 or 0-3 point scoring per factor)
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      - name: "Migraine Factor: Humidity"
        unique_id: migraine_factor_humidity
        state: >
          {% set h = states('sensor.migraine_humidity') | float(0) %}
          {% set hi = states('input_number.migraine_threshold_humidity_high') | float(80) %}
          {% set lo = states('input_number.migraine_threshold_humidity_low') | float(30) %}
          {% if h > hi %}
            2
          {% elif h < lo %}
            1
          {% else %}
            0
          {% endif %}
        icon: mdi:water-percent

      - name: "Migraine Factor: Temperature"
        unique_id: migraine_factor_temperature
        state: >
          {% set raw = states('sensor.migraine_temperature') %}
          {% if raw in ['unknown','unavailable','',none] %}
            0
          {% else %}
            {% set t = raw | float(0) %}
            {% set hot = states('input_number.migraine_threshold_temp_hot') | float(30) %}
            {% set cold = states('input_number.migraine_threshold_temp_cold') | float(5) %}
            {% if t > hot or t < cold %}
              2
            {% else %}
              0
            {% endif %}
          {% endif %}
        icon: mdi:thermometer-alert

      - name: "Migraine Factor: Temperature Change"
        unique_id: migraine_factor_temperature_change
        state: >
          {% set delta = states('sensor.migraine_temperature_change_6h') | float(0) %}
          {% set t1 = states('input_number.migraine_threshold_temp_change_1') | float(5) %}
          {% set t2 = states('input_number.migraine_threshold_temp_change_2') | float(8) %}
          {% if delta >= t2 %}
            2
          {% elif delta >= t1 %}
            1
          {% else %}
            0
          {% endif %}
        icon: mdi:thermometer-chevron-up
        attributes:
          change_6h: "{{ states('sensor.migraine_temperature_change_6h') }}°C"
          direction: "{{ state_attr('sensor.migraine_temperature_change_6h', 'direction') }}"
          scoring: "0pts (<5°C) | 1pt (5-8°C) | 2pts (≥8°C)"

      - name: "Migraine Factor: Wind"
        unique_id: migraine_factor_wind
        state: >
          {% set w = states('sensor.migraine_wind_speed') | float(0) %}
          {% set w1 = states('input_number.migraine_threshold_wind_1') | float(35) %}
          {% set w2 = states('input_number.migraine_threshold_wind_2') | float(50) %}
          {% if w >= w2 %}
            2
          {% elif w >= w1 %}
            1
          {% else %}
            0
          {% endif %}
        icon: mdi:weather-windy

      - name: "Migraine Factor: UV / Sun"
        unique_id: migraine_factor_uv_sun
        state: >
          {% set uv = states('sensor.migraine_uv_index') | float(0) %}
          {% set u1 = states('input_number.migraine_threshold_uv_1') | float(6) %}
          {% set u2 = states('input_number.migraine_threshold_uv_2') | float(8) %}
          {% if uv >= u2 %}
            2
          {% elif uv >= u1 %}
            1
          {% else %}
            0
          {% endif %}
        icon: mdi:white-balance-sunny

      - name: "Migraine Factor: Air Quality"
        unique_id: migraine_factor_air_quality
        state: >
          {% set aqi = states('sensor.migraine_waqi_aqi') | float(0) %}
          {% set pm25 = states('sensor.migraine_waqi_pm25') | float(0) %}
          {% set pm10 = states('sensor.migraine_waqi_pm10') | float(0) %}
          {% set o3 = states('sensor.migraine_waqi_o3') | float(0) %}
          {% set a1 = states('input_number.migraine_threshold_aqi_1') | float(50) %}
          {% set a2 = states('input_number.migraine_threshold_aqi_2') | float(100) %}
          {% set a3 = states('input_number.migraine_threshold_aqi_3') | float(150) %}
          {% set base = 0 if aqi <= a1 else 1 if aqi <= a2 else 2 if aqi <= a3 else 3 %}
          {% set nudge = 0 %}
          {% if pm25 >= 25 %}{% set nudge = nudge + 1 %}{% endif %}
          {% if pm10 >= 50 %}{% set nudge = nudge + 1 %}{% endif %}
          {% if o3 >= 120 %}{% set nudge = nudge + 1 %}{% endif %}
          {{ [base + nudge, 3] | min }}
        icon: mdi:smog
        attributes:
          aqi: "{{ states('sensor.migraine_waqi_aqi') }}"
          pm25_ugm3: "{{ states('sensor.migraine_waqi_pm25') }}"
          pm10_ugm3: "{{ states('sensor.migraine_waqi_pm10') }}"
          o3_ugm3: "{{ states('sensor.migraine_waqi_o3') }}"

      # NOTE: "Migraine Factor: Thunderstorm Nearby" is now a trigger-based
      # template sensor (see the TRIGGER-BASED FORECAST block below) using
      # the weather.get_forecasts action, since modern weather integrations
      # no longer expose the 'forecast' attribute.

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # MIGRAINE RISK SCORE & LEVEL
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      - name: Migraine Risk Score
        unique_id: migraine_risk_score
        unit_of_measurement: "pts"
        availability: >
          {{ states('sensor.migraine_pressure_hpa') not in ['unknown','unavailable','',none] }}
        state: >
          {% set d6 = states('sensor.migraine_pressure_drop_6h') | float(0) %}
          {% set d24 = states('sensor.migraine_pressure_drop_24h') | float(0) %}
          {% set humf = states('sensor.migraine_factor_humidity') | int(0) %}
          {% set tempf = states('sensor.migraine_factor_temperature') | int(0) %}
          {% set temp_chg = states('sensor.migraine_factor_temperature_change') | int(0) %}
          {% set windf = states('sensor.migraine_factor_wind') | int(0) %}
          {% set uvf = states('sensor.migraine_factor_uv_sun') | int(0) %}
          {% set thf = states('sensor.migraine_factor_thunderstorm_nearby') | int(0) %}
          {% set aqif = states('sensor.migraine_factor_air_quality') | int(0) %}
          {% set p1 = states('input_number.migraine_threshold_pressure_6h_1') | float(4) %}
          {% set p2 = states('input_number.migraine_threshold_pressure_6h_2') | float(6) %}
          {% set p3 = states('input_number.migraine_threshold_pressure_6h_3') | float(8) %}
          {% set p4 = states('input_number.migraine_threshold_pressure_6h_4') | float(10) %}
          {% set q1 = states('input_number.migraine_threshold_pressure_24h_1') | float(6) %}
          {% set q2 = states('input_number.migraine_threshold_pressure_24h_2') | float(10) %}
          {% set q3 = states('input_number.migraine_threshold_pressure_24h_3') | float(14) %}
          {% set d6_pts = 4 if d6 >= p4 else 3 if d6 >= p3 else 2 if d6 >= p2 else 1 if d6 >= p1 else 0 %}
          {% set d24_pts = 3 if d24 >= q3 else 2 if d24 >= q2 else 1 if d24 >= q1 else 0 %}
          {{ d6_pts + d24_pts + humf + tempf + temp_chg + windf + uvf + thf + aqif }}
        icon: mdi:head-alert-outline
        attributes:
          pressure_6h_points: >
            {% set d6 = states('sensor.migraine_pressure_drop_6h') | float(0) %}
            {% set p1 = states('input_number.migraine_threshold_pressure_6h_1') | float(4) %}
            {% set p2 = states('input_number.migraine_threshold_pressure_6h_2') | float(6) %}
            {% set p3 = states('input_number.migraine_threshold_pressure_6h_3') | float(8) %}
            {% set p4 = states('input_number.migraine_threshold_pressure_6h_4') | float(10) %}
            {{ 4 if d6 >= p4 else 3 if d6 >= p3 else 2 if d6 >= p2 else 1 if d6 >= p1 else 0 }}
          pressure_24h_points: >
            {% set d24 = states('sensor.migraine_pressure_drop_24h') | float(0) %}
            {% set q1 = states('input_number.migraine_threshold_pressure_24h_1') | float(6) %}
            {% set q2 = states('input_number.migraine_threshold_pressure_24h_2') | float(10) %}
            {% set q3 = states('input_number.migraine_threshold_pressure_24h_3') | float(14) %}
            {{ 3 if d24 >= q3 else 2 if d24 >= q2 else 1 if d24 >= q1 else 0 }}
          humidity_points: "{{ states('sensor.migraine_factor_humidity') | int(0) }}"
          temperature_points: "{{ states('sensor.migraine_factor_temperature') | int(0) }}"
          temperature_change_points: "{{ states('sensor.migraine_factor_temperature_change') | int(0) }}"
          wind_points: "{{ states('sensor.migraine_factor_wind') | int(0) }}"
          uv_points: "{{ states('sensor.migraine_factor_uv_sun') | int(0) }}"
          thunderstorm_points: "{{ states('sensor.migraine_factor_thunderstorm_nearby') | int(0) }}"
          air_quality_points: "{{ states('sensor.migraine_factor_air_quality') | int(0) }}"

      - name: Migraine Risk Level
        unique_id: migraine_risk_level
        state: >
          {% set s = states('sensor.migraine_risk_score') | int(0) %}
          {% if s >= 12 %}
            Very High
          {% elif s >= 8 %}
            High
          {% elif s >= 4 %}
            Moderate
          {% else %}
            Low
          {% endif %}
        icon: >
          {% set s = states('sensor.migraine_risk_score') | int(0) %}
          {% if s >= 12 %}
            mdi:alert-decagram
          {% elif s >= 8 %}
            mdi:alert
          {% elif s >= 4 %}
            mdi:alert-outline
          {% else %}
            mdi:check
          {% endif %}

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # TOMORROW'S RISK FORECAST
      # Only works if you configure the forecast source entities above.
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      - name: "Migraine Risk Forecast Tomorrow"
        unique_id: migraine_risk_forecast_tomorrow
        unit_of_measurement: "pts"
        availability: >
          {% set fd = states('sensor.migraine_forecast_tomorrow_data') %}
          {% set tmax_entity = states('input_text.migraine_source_forecast_temp_max') %}
          {{ (fd not in ['unknown','unavailable','',none]
              and state_attr('sensor.migraine_forecast_tomorrow_data','temp_max') is not none)
             or (tmax_entity not in ['not_configured','unknown','unavailable','',none]
                 and states(tmax_entity) | float(none) is not none) }}
        state: >
          {# ── Prefer weather.get_forecasts data, fall back to input_text helpers ── #}
          {% set fd = 'sensor.migraine_forecast_tomorrow_data' %}
          {% set fd_tmax = state_attr(fd, 'temp_max') %}
          {% set fd_tmin = state_attr(fd, 'temp_min') %}
          {% set fd_uv = state_attr(fd, 'uv_index') %}
          {% set fd_rain = state_attr(fd, 'rain_chance') %}
          {% set fd_wind = state_attr(fd, 'wind_kmh') %}
          {% set fd_thunder = state_attr(fd, 'thunder_tomorrow') in [true, 'True', 'true'] %}
          {% set tmax_entity = states('input_text.migraine_source_forecast_temp_max') %}
          {% set tmin_entity = states('input_text.migraine_source_forecast_temp_min') %}
          {% set uv_entity = states('input_text.migraine_source_forecast_uv') %}
          {% set fc_entity = states('input_text.migraine_source_forecast_text') %}
          {% set rain_entity = states('input_text.migraine_source_forecast_rain_chance') %}
          {% set helper_tmax = states(tmax_entity) | float(none) if tmax_entity not in ['not_configured','unknown','unavailable','',none] else none %}
          {% set helper_tmin = states(tmin_entity) | float(none) if tmin_entity not in ['not_configured','unknown','unavailable','',none] else none %}
          {% set helper_uv = states(uv_entity) | float(none) if uv_entity not in ['not_configured','unknown','unavailable','',none] else none %}
          {% set helper_rain = states(rain_entity) | float(none) if rain_entity not in ['not_configured','unknown','unavailable','',none] else none %}
          {% set tmax = fd_tmax | float(none) if fd_tmax is not none else helper_tmax %}
          {% set tmin = fd_tmin | float(none) if fd_tmin is not none else helper_tmin %}
          {% set uv = fd_uv | float(none) if fd_uv is not none else helper_uv %}
          {% set rain_chance = fd_rain | float(none) if fd_rain is not none else helper_rain %}
          {# ── Temperature extremes (skip if no data instead of assuming 0°) ── #}
          {% set temp_pts = 0 %}
          {% if tmax is not none and tmin is not none %}
            {% set hot = states('input_number.migraine_threshold_temp_hot') | float(30) %}
            {% set cold = states('input_number.migraine_threshold_temp_cold') | float(5) %}
            {% set temp_pts = 2 if (tmax > hot or tmin < cold) else 1 if (tmax > hot - 2 or tmin < cold + 3) else 0 %}
          {% elif tmax is not none %}
            {% set hot = states('input_number.migraine_threshold_temp_hot') | float(30) %}
            {% set temp_pts = 2 if tmax > hot else 1 if tmax > hot - 2 else 0 %}
          {% endif %}
          {# ── Temperature swing (range as proxy for change) ── #}
          {% set swing_pts = 0 %}
          {% if tmax is not none and tmin is not none %}
            {% set temp_range = tmax - tmin %}
            {% set swing_pts = 2 if temp_range >= 15 else 1 if temp_range >= 10 else 0 %}
          {% endif %}
          {# ── UV ── #}
          {% set uv_pts = 0 %}
          {% if uv is not none %}
            {% set u1 = states('input_number.migraine_threshold_uv_1') | float(6) %}
            {% set u2 = states('input_number.migraine_threshold_uv_2') | float(8) %}
            {% set uv_pts = 2 if uv >= u2 else 1 if uv >= u1 else 0 %}
          {% endif %}
          {# ── Wind: numeric from forecast, else RU/EN keywords in text ── #}
          {% set fc_text = states(fc_entity) | lower if fc_entity not in ['not_configured','unknown','unavailable','',none] else '' %}
          {% set wind_pts = 0 %}
          {% if fd_wind is not none and fd_wind | float(none) is not none %}
            {% set w = fd_wind | float(0) %}
            {% set w1 = states('input_number.migraine_threshold_wind_1') | float(35) %}
            {% set w2 = states('input_number.migraine_threshold_wind_2') | float(50) %}
            {% set wind_pts = 2 if w >= w2 else 1 if w >= w1 else 0 %}
          {% elif fc_text %}
            {% set severe_kw = ['damaging winds', 'destructive winds', 'strong winds',
                                'ураган', 'штормовой ветер', 'очень сильный ветер', 'разрушительн'] %}
            {% set mild_kw = ['windy', 'сильный ветер', 'порывистый ветер', 'усиление ветра'] %}
            {% if severe_kw | select('in', fc_text) | list | length > 0 %}
              {% set wind_pts = 2 %}
            {% elif mild_kw | select('in', fc_text) | list | length > 0 %}
              {% set wind_pts = 1 %}
            {% endif %}
          {% endif %}
          {# ── Thunderstorm: forecast condition, else RU/EN keywords ── #}
          {% set thunder_kw = ['thunderstorm', 'thunder', 'lightning', 'гроз', 'молни', 'шторм'] %}
          {% set thunder_pts = 2 if (fd_thunder or thunder_kw | select('in', fc_text) | list | length > 0) else 0 %}
          {# ── Humidity proxy from rain chance ── #}
          {% set hum_pts = 1 if (rain_chance is not none and rain_chance >= 80) else 0 %}
          {{ temp_pts + swing_pts + uv_pts + wind_pts + thunder_pts + hum_pts }}
        icon: mdi:crystal-ball
        attributes:
          temp_max: >
            {% set v = state_attr('sensor.migraine_forecast_tomorrow_data', 'temp_max') | float(none) %}
            {% if v is none %}
              {% set e = states('input_text.migraine_source_forecast_temp_max') %}
              {% set v = states(e) | float(none) if e not in ['not_configured','unknown','unavailable','',none] else none %}
            {% endif %}
            {{ (v | round(1) ~ '°C') if v is not none else 'N/A' }}
          temp_min: >
            {% set v = state_attr('sensor.migraine_forecast_tomorrow_data', 'temp_min') | float(none) %}
            {% if v is none %}
              {% set e = states('input_text.migraine_source_forecast_temp_min') %}
              {% set v = states(e) | float(none) if e not in ['not_configured','unknown','unavailable','',none] else none %}
            {% endif %}
            {{ (v | round(1) ~ '°C') if v is not none else 'N/A' }}
          uv_index: >
            {% set v = state_attr('sensor.migraine_forecast_tomorrow_data', 'uv_index') | float(none) %}
            {% if v is none %}
              {% set e = states('input_text.migraine_source_forecast_uv') %}
              {% set v = states(e) | float(none) if e not in ['not_configured','unknown','unavailable','',none] else none %}
            {% endif %}
            {{ v | round(1) if v is not none else 'N/A' }}
          rain_chance: >
            {% set v = state_attr('sensor.migraine_forecast_tomorrow_data', 'rain_chance') | float(none) %}
            {% if v is none %}
              {% set e = states('input_text.migraine_source_forecast_rain_chance') %}
              {% set v = states(e) | float(none) if e not in ['not_configured','unknown','unavailable','',none] else none %}
            {% endif %}
            {{ (v | round(0) ~ '%') if v is not none else 'N/A' }}
          condition: "{{ states('sensor.migraine_forecast_tomorrow_data') }}"
          risk_level: >
            {% set s = states('sensor.migraine_risk_forecast_tomorrow') | int(0) %}
            {% if s >= 8 %}
              Very High
            {% elif s >= 5 %}
              High
            {% elif s >= 3 %}
              Moderate
            {% else %}
              Low
            {% endif %}

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # TRIGGER-BASED FORECAST
  # Modern weather integrations no longer expose the 'forecast'
  # attribute, so forecasts are fetched here via the
  # weather.get_forecasts action every 30 minutes.
  # Source: input_text.migraine_source_weather (a weather.* entity)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  - triggers:
      - trigger: homeassistant
        event: start
      - trigger: event
        event_type: event_template_reloaded
      - trigger: time_pattern
        minutes: "/30"
      - trigger: state
        entity_id: input_text.migraine_source_weather
    conditions:
      - condition: template
        value_template: >
          {% set w = states('input_text.migraine_source_weather') %}
          {{ w not in ['not_configured','unknown','unavailable','',none]
             and w.startswith('weather.')
             and states(w) not in ['unknown','unavailable','',none] }}
    actions:
      - variables:
          weather_entity: "{{ states('input_text.migraine_source_weather') }}"
      # Hourly forecast (may be unsupported by some integrations)
      - action: weather.get_forecasts
        target:
          entity_id: "{{ weather_entity }}"
        data:
          type: hourly
        response_variable: hourly_response
        continue_on_error: true
      # Daily forecast
      - action: weather.get_forecasts
        target:
          entity_id: "{{ weather_entity }}"
        data:
          type: daily
        response_variable: daily_response
        continue_on_error: true
      - variables:
          hourly_fc: >
            {{ (hourly_response | default({})).get(weather_entity, {}).get('forecast', []) }}
          daily_fc: >
            {{ (daily_response | default({})).get(weather_entity, {}).get('forecast', []) }}
          thunder_conditions: "{{ ['lightning', 'lightning-rainy', 'thunderstorm', 'storm'] }}"
          # Thunderstorm expected within the next 3 hours (hourly forecast)
          thunder_next_3h: >
            {% set ns = namespace(hit=false) %}
            {% for f in hourly_fc %}
              {% set dt = f.datetime | as_datetime %}
              {% if dt is not none and f.condition | default('') in thunder_conditions %}
                {% set dt = dt | as_local %}
                {% if now() - timedelta(hours=1) <= dt <= now() + timedelta(hours=3) %}
                  {% set ns.hit = true %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {{ ns.hit }}
          # Thunderstorm expected at any point today (hourly, falls back to daily)
          thunder_today: >
            {% set ns = namespace(hit=false) %}
            {% for f in hourly_fc %}
              {% set dt = f.datetime | as_datetime %}
              {% if dt is not none and f.condition | default('') in thunder_conditions
                    and (dt | as_local).date() == now().date() %}
                {% set ns.hit = true %}
              {% endif %}
            {% endfor %}
            {% for f in daily_fc %}
              {% set dt = f.datetime | as_datetime %}
              {% if dt is not none and f.condition | default('') in thunder_conditions
                    and (dt | as_local).date() == now().date() %}
                {% set ns.hit = true %}
              {% endif %}
            {% endfor %}
            {{ ns.hit }}
          # Tomorrow's daily forecast entry (empty dict if not found)
          tomorrow_entry: >
            {% set tomorrow = (now() + timedelta(days=1)).date() %}
            {% set ns = namespace(e={}) %}
            {% for f in daily_fc %}
              {% set dt = f.datetime | as_datetime %}
              {% if dt is not none and (dt | as_local).date() == tomorrow %}
                {% set ns.e = f %}
              {% endif %}
            {% endfor %}
            {{ ns.e }}
          # Wind normalised to km/h for scoring
          tomorrow_wind_kmh: >
            {% set v = tomorrow_entry.get('wind_speed') %}
            {% if v is none %}
              {{ none }}
            {% else %}
              {% set u = state_attr(weather_entity, 'wind_speed_unit') | default('km/h', true) | lower %}
              {% if 'm/s' in u or 'м/с' in u %}
                {{ (v | float(0)) * 3.6 }}
              {% elif 'mph' in u %}
                {{ (v | float(0)) * 1.60934 }}
              {% else %}
                {{ v | float(0) }}
              {% endif %}
            {% endif %}
    sensor:
      # Restored factor sensor (referenced by risk score & lightning alert).
      # 2 pts: active warning OR thunderstorm within 3 hours
      # 1 pt:  thunderstorm expected later today (forecast or text mention)
      - name: "Migraine Factor: Thunderstorm Nearby"
        unique_id: migraine_factor_thunderstorm_nearby
        state: >
          {% set kw = ['thunderstorm', 'thunder', 'lightning', 'severe storm',
                       'гроз', 'молни', 'шторм'] %}
          {% set warn_entity = states('input_text.migraine_source_weather_warnings') %}
          {% set fc_entity = states('input_text.migraine_source_forecast_text_today') %}
          {% set warnings_text = states(warn_entity) | lower
             if warn_entity not in ['not_configured','unknown','unavailable','',none] else '' %}
          {% set forecast_text = states(fc_entity) | lower
             if fc_entity not in ['not_configured','unknown','unavailable','',none] else '' %}
          {% set warning_thunder = kw | select('in', warnings_text) | list | length > 0 %}
          {% set text_thunder = kw | select('in', forecast_text) | list | length > 0 %}
          {% if warning_thunder or thunder_next_3h %}
            2
          {% elif thunder_today or text_thunder %}
            1
          {% else %}
            0
          {% endif %}
        icon: mdi:weather-lightning
        attributes:
          thunder_next_3h: "{{ thunder_next_3h }}"
          thunder_today: "{{ thunder_today }}"
          detection_method: >
            {% if thunder_next_3h %}
              Forecast: thunderstorm within 3 hours
            {% elif thunder_today %}
              Forecast: thunderstorm later today
            {% else %}
              {% set kw = ['thunderstorm', 'thunder', 'lightning', 'severe storm',
                           'гроз', 'молни', 'шторм'] %}
              {% set warn_entity = states('input_text.migraine_source_weather_warnings') %}
              {% set fc_entity = states('input_text.migraine_source_forecast_text_today') %}
              {% set warnings_text = states(warn_entity) | lower
                 if warn_entity not in ['not_configured','unknown','unavailable','',none] else '' %}
              {% set forecast_text = states(fc_entity) | lower
                 if fc_entity not in ['not_configured','unknown','unavailable','',none] else '' %}
              {% if kw | select('in', warnings_text) | list | length > 0 %}
                Active warning detected
              {% elif kw | select('in', forecast_text) | list | length > 0 %}
                Forecast text mentions thunderstorm
              {% else %}
                No thunderstorm detected
              {% endif %}
            {% endif %}
          last_fetch: "{{ now().isoformat() }}"

      # Numeric data for tomorrow, extracted from the daily forecast.
      # Consumed by "Migraine Risk Forecast Tomorrow" below.
      - name: "Migraine Forecast Tomorrow Data"
        unique_id: migraine_forecast_tomorrow_data
        state: "{{ tomorrow_entry.get('condition', 'unknown') }}"
        icon: mdi:calendar-clock
        attributes:
          temp_max: "{{ tomorrow_entry.get('temperature') }}"
          temp_min: "{{ tomorrow_entry.get('templow') }}"
          uv_index: "{{ tomorrow_entry.get('uv_index') }}"
          rain_chance: "{{ tomorrow_entry.get('precipitation_probability') }}"
          humidity: "{{ tomorrow_entry.get('humidity') }}"
          wind_kmh: "{{ tomorrow_wind_kmh }}"
          thunder_tomorrow: >
            {{ tomorrow_entry.get('condition', '') in ['lightning', 'lightning-rainy', 'thunderstorm', 'storm'] }}
          last_fetch: "{{ now().isoformat() }}"

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # BINARY SENSORS (alerts & triggers)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  - binary_sensor:
      - name: "Migraine Lightning Alert"
        unique_id: migraine_lightning_alert
        state: >
          {{ is_state('input_boolean.migraine_badge_override','on')
             or states('sensor.migraine_factor_thunderstorm_nearby') | int >= 2 }}
        device_class: problem
        icon: >
          {% if is_state(this.entity_id,'on') %}
            mdi:weather-lightning
          {% else %}
            mdi:head-check-outline
          {% endif %}

      - name: Migraine Risk Warning
        unique_id: migraine_risk_warning
        device_class: problem
        state: "{{ states('sensor.migraine_risk_score') | int >= 8 }}"
        icon: >
          {% if is_state(this.entity_id,'on') %}mdi:alert{% else %}mdi:check{% endif %}

      - name: Pressure Drop Alert (4hPa)
        unique_id: pressure_drop_alert_4hpa
        device_class: problem
        state: >
          {% set drop_6h = states('sensor.migraine_pressure_drop_6h') | float(0) %}
          {% set drop_24h = states('sensor.migraine_pressure_drop_24h') | float(0) %}
          {{ drop_6h >= states('input_number.migraine_threshold_pressure_6h_1') | float(4)
             or drop_24h >= states('input_number.migraine_threshold_pressure_24h_1') | float(6) }}
        icon: >
          {% if is_state(this.entity_id,'on') %}mdi:trending-down{% else %}mdi:trending-neutral{% endif %}
        attributes:
          pressure_drop_6h: "{{ states('sensor.migraine_pressure_drop_6h') }} hPa"
          pressure_drop_24h: "{{ states('sensor.migraine_pressure_drop_24h') }} hPa"
          current_pressure: "{{ states('sensor.migraine_pressure_hpa') }} hPa"

      - name: Poor Air Today
        unique_id: poor_air_today
        state: >
          {% set aqi = states('sensor.migraine_waqi_aqi') | float(0) %}
          {% set pm25 = states('sensor.migraine_waqi_pm25') | float(0) %}
          {{ aqi > 100 or pm25 >= 25 }}
        icon: >
          {% if is_state(this.entity_id,'on') %}mdi:smog{% else %}mdi:weather-sunny{% endif %}
        device_class: problem
        attributes:
          aqi: "{{ states('sensor.migraine_waqi_aqi') }}"
          pm25: "{{ states('sensor.migraine_waqi_pm25') }}"


###############################################################################
# AUTOMATIONS — Pressure & Temperature Baseline Tracking
# These run automatically to maintain the rolling peak/baseline values.
###############################################################################

automation:
  - id: migraine_track_pressure_peaks
    alias: "Migraine: Track Pressure Peaks"
    description: "Tracks pressure peaks over 6h and 24h rolling windows for migraine drop detection"
    trigger:
      - platform: time_pattern
        minutes: "/10"
    condition:
      - condition: template
        value_template: >
          {{ states('sensor.migraine_pressure_hpa') not in ['unknown','unavailable','',none]
             and states('sensor.migraine_pressure_hpa') | float(0) > 900 }}
    action:
      - variables:
          current_pressure: "{{ states('sensor.migraine_pressure_hpa') | float(0) }}"
          current_time: "{{ as_timestamp(now()) }}"
          peak_6h: "{{ states('input_number.pressure_6h_peak') | float(0) }}"
          reset_time_6h: "{{ states('input_number.pressure_6h_reset_time') | int(0) }}"
          hours_since_reset_6h: "{{ (as_timestamp(now()) - (states('input_number.pressure_6h_reset_time') | int(0))) / 3600 }}"
          peak_24h: "{{ states('input_number.pressure_24h_peak') | float(0) }}"
          reset_time_24h: "{{ states('input_number.pressure_24h_reset_time') | int(0) }}"
          hours_since_reset_24h: "{{ (as_timestamp(now()) - (states('input_number.pressure_24h_reset_time') | int(0))) / 3600 }}"
      # 6-hour window
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ hours_since_reset_6h >= 6 or reset_time_6h == 0 }}"
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.pressure_6h_peak
                data:
                  value: "{{ current_pressure }}"
              - service: input_number.set_value
                target:
                  entity_id: input_number.pressure_6h_reset_time
                data:
                  value: "{{ current_time }}"
          - conditions:
              - condition: template
                value_template: "{{ current_pressure > peak_6h }}"
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.pressure_6h_peak
                data:
                  value: "{{ current_pressure }}"
      # 24-hour window
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ hours_since_reset_24h >= 24 or reset_time_24h == 0 }}"
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.pressure_24h_peak
                data:
                  value: "{{ current_pressure }}"
              - service: input_number.set_value
                target:
                  entity_id: input_number.pressure_24h_reset_time
                data:
                  value: "{{ current_time }}"
          - conditions:
              - condition: template
                value_template: "{{ current_pressure > peak_24h }}"
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.pressure_24h_peak
                data:
                  value: "{{ current_pressure }}"

  - id: migraine_track_temperature_baseline
    alias: "Migraine: Track Temperature Baseline"
    description: "Records temperature baseline every 6 hours for rapid change detection"
    trigger:
      - platform: time_pattern
        minutes: "/10"
    condition:
      - condition: template
        value_template: >
          {{ states('sensor.migraine_temperature') not in ['unknown','unavailable','',none] }}
    action:
      - variables:
          current_temp: "{{ states('sensor.migraine_temperature') | float(0) }}"
          current_time: "{{ as_timestamp(now()) }}"
          reset_time: "{{ states('input_number.temperature_6h_reset_time') | int(0) }}"
          hours_since_reset: "{{ (as_timestamp(now()) - (states('input_number.temperature_6h_reset_time') | int(0))) / 3600 }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ hours_since_reset >= 6 or reset_time == 0 }}"
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.temperature_6h_baseline
                data:
                  value: "{{ current_temp }}"
              - service: input_number.set_value
                target:
                  entity_id: input_number.temperature_6h_reset_time
                data:
                  value: "{{ current_time }}"
    mode: single
