name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    name: Attach card to release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Syntax check
        run: node --check dist/migraine-risk-card.js

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/migraine-risk-card.js
            sensor-package/migraine_sensors.yaml
